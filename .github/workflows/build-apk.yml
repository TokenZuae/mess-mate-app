name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Project Dependencies
        run: npm install

      - name: Build Web Production Assets
        run: npm run build

      - name: Setup Java Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK and Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli
          npm install @capacitor/android
          
          # Force create a fresh config to avoid initialization blocks
          echo '{"appId": "com.tokenzuae.messmate", "appName": "mess-mate-app", "webDir": "dist"}' > capacitor.config.json
          
          npx cap add android
          
          # Injecting the Kotlin duplicate class fix directly into the generated Gradle file
          echo -e "\nsubprojects {\n    configurations.configureEach {\n        resolutionStrategy {\n            exclude group: \"org.jetbrains.kotlin\", module: \"kotlin-stdlib-jdk8\"\n            exclude group: \"org.jetbrains.kotlin\", module: \"kotlin-stdlib-jdk7\"\n        }\n    }\n}" >> android/build.gradle
          
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mess-mate-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

