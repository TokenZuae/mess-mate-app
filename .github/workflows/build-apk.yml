name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm install

      - name: Build Web Production Assets
        run: npm run build

      - name: Setup Java Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK and Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli
          npx cap init mess-mate-app com.tokenzuae.messmate --web-dir=dist
          npm install @capacitor/android
          npx cap add android
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mess-mate-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

